spring:
  datasource:
    url: jdbc:h2:mem:learning;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

synapse:
  jwt:
    public-key: ${JWT_PUBLIC_KEY:}
    issuer: synapse-auth
