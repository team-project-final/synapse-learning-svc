name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            java:
              - 'learning-card/**'
            python:
              - 'learning-ai/**'

  build-java:
    needs: detect-changes
    if: needs.detect-changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-card
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Build & Test
        run: ./gradlew build --no-daemon
      - name: Modulith verify
        run: ./gradlew test --tests '*ModuleStructureTest' --no-daemon

  build-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-ai
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy app
      - name: Test (pytest)
        run: pytest -v

  e2e-python:
    needs: detect-changes
    if: needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-ai
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: E2E Tests
        run: pytest -v -m e2e

  dev-smoke:
    needs: detect-changes
    if: needs.detect-changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-card
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Grant execute permission
        run: chmod +x gradlew
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Start dev services
        run: docker compose -f docker-compose.ci.yml up -d --wait
      - name: Boot app (dev) and verify health
        run: |
          ./gradlew bootRun --args='--spring.profiles.active=dev' > app.log 2>&1 &
          APP_PID=$!
          HEALTHY=0
          for i in $(seq 1 60); do
            if curl -sf "http://localhost:8084/actuator/health" | grep -q '"status":"UP"'; then
              HEALTHY=1; echo "actuator health UP"; break
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then echo "app process exited early"; break; fi
            sleep 3
          done
          if [ "$HEALTHY" != "1" ]; then
            echo "===== app.log ====="; cat app.log
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi
          kill "$APP_PID" 2>/dev/null || true
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
