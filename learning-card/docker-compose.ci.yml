# dev-smoke 인프라: learning 앱 부팅에 필요한 postgres + redis 제공.
# Kafka producer 빈은 지연 연결이라 부팅/헬스체크에 broker가 불필요하며,
# Kafka/Avro 심화 검증은 @EmbeddedKafka 통합 테스트(build job)가 담당한다.
# Redis는 stats 캐시(@EnableCaching) 활성화로 actuator health에 포함되어
# 부팅 후 health=UP 판정에 필요하다.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synapse_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapse_learning"]
      interval: 5s
      timeout: 5s
      retries: 15
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 15
