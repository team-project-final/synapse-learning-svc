services:
  db:
    image: pgvector/pgvector:pg16
    container_name: synapse-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synapse
    restart: always

  learning-ai:
    build: .
    container_name: learning-ai
    ports:
      - "8090:8090"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    restart: unless-stopped
